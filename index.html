<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNCLEARED — MUMAFI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #08080a;
    --bg2: #0f1013;
    --chrome1: #f2f5f8;
    --chrome2: #c7d2dc;
    --blue: #3d5fff;
    --blue-glow: #6c86ff;
    --green: #5a6f45;
    --text-dim: #6b7078;
    --text-mid: #9aa0a8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    background: var(--bg);
    color: var(--chrome1);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding: 40px 20px;
    position:relative;
    background:
      radial-gradient(ellipse 900px 500px at 50% 30%, rgba(61,95,255,0.08), transparent 60%),
      radial-gradient(ellipse 700px 400px at 50% 75%, rgba(90,111,69,0.06), transparent 60%),
      var(--bg);
  }

  .wrap{
    max-width: 640px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:2;
  }

  .artist{
    font-family:'Oswald', sans-serif;
    font-size:13px;
    letter-spacing:0.45em;
    color: var(--text-dim);
    text-transform:uppercase;
    margin-bottom: 22px;
    opacity:0;
    animation: fadeUp 0.8s ease forwards;
  }

  .logo{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: clamp(52px, 13vw, 96px);
    text-align:center;
    letter-spacing: 0.01em;
    line-height:0.95;
    background: linear-gradient(180deg,
      #ffffff 0%,
      var(--chrome1) 22%,
      var(--blue-glow) 45%,
      var(--chrome2) 58%,
      #7d8896 75%,
      var(--chrome1) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(61,95,255,0.35));
    transform: skewX(-3deg);
    position:relative;
    opacity:0;
    animation: chromeIn 1.1s ease forwards 0.15s;
    text-shadow: 0 0 40px rgba(61,95,255,0.15);
  }

  .logo::after{
    content:'UNCLEARED';
    position:absolute;
    inset:0;
    background: linear-gradient(180deg, transparent 40%, rgba(90,111,69,0.5) 48%, transparent 56%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    mix-blend-mode: screen;
  }

  @keyframes chromeIn{
    0%{ opacity:0; letter-spacing:0.3em; filter: blur(8px) drop-shadow(0 0 0 transparent); }
    100%{ opacity:1; letter-spacing:0.01em; filter: blur(0) drop-shadow(0 0 18px rgba(61,95,255,0.35)); }
  }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .ep-label{
    font-size:11px;
    letter-spacing:0.35em;
    color: var(--text-dim);
    text-transform:uppercase;
    margin-top:18px;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 0.5s;
  }

  .ep-label span{ color: var(--blue-glow); }

  /* Countdown */
  .countdown{
    display:flex;
    gap: clamp(10px, 3vw, 22px);
    margin: 48px 0 44px;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }

  .cd-unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:64px;
  }

  .cd-num{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: clamp(30px, 8vw, 46px);
    color: var(--chrome1);
    line-height:1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 20px rgba(61,95,255,0.25);
  }

  .cd-label{
    font-size:10px;
    letter-spacing:0.2em;
    color: var(--text-dim);
    text-transform:uppercase;
    margin-top:8px;
  }

  .cd-sep{
    font-family:'Oswald', sans-serif;
    font-size: clamp(24px, 6vw, 36px);
    color: var(--text-dim);
    align-self:flex-start;
    margin-top: 2px;
  }

  /* Tracklist */
  .tracklist{
    width:100%;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 24px;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 0.9s;
    user-select: none;
    -webkit-user-select: none;
  }

  .tl-title{
    font-size:10px;
    letter-spacing:0.3em;
    color: var(--text-dim);
    text-transform:uppercase;
    margin-bottom:16px;
    text-align:center;
  }

  .track{
    display:flex;
    align-items:baseline;
    gap:16px;
    padding: 11px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: padding-left 0.25s ease, border-color 0.25s ease;
  }

  .track:hover{
    padding-left: 12px;
    border-color: rgba(61,95,255,0.3);
  }

  .track:last-child{ border-bottom:none; }

  .t-num{
    font-size:12px;
    color: var(--text-dim);
    min-width:16px;
  }

  .t-name{
    font-family:'Oswald', sans-serif;
    font-size: clamp(15px, 3.6vw, 18px);
    font-weight:500;
    color: var(--chrome1);
    letter-spacing:0.02em;
    flex:1;
  }

  .t-dur{
    font-size:11px;
    color: var(--text-dim);
  }

  /* CTA */
  .cta{
    margin-top: 44px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 1.1s;
  }

  .notify-btn{
    display:inline-block;
    background: linear-gradient(180deg, var(--chrome1), var(--chrome2));
    color: #0a0a0c;
    border:none;
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    text-decoration:none;
    padding: 15px 38px;
    cursor:pointer;
    position:relative;
    clip-path: polygon(6% 0, 100% 0, 94% 100%, 0 100%);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .notify-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(61,95,255,0.3);
  }

  .notify-btn:active{ transform: translateY(0); }

  .socials{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap: 16px 22px;
    max-width: 420px;
  }

  .socials a{
    color: var(--text-mid);
    font-size:11px;
    letter-spacing:0.1em;
    text-decoration:none;
    text-transform:uppercase;
    border-bottom:1px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
  }

  .socials a:hover{
    color: var(--blue-glow);
    border-color: var(--blue-glow);
  }

  footer{
    margin-top:60px;
    font-size:10px;
    color: var(--text-dim);
    letter-spacing:0.1em;
    text-align:center;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 1.3s;
  }

  @media (max-width: 400px){
    .countdown{ gap:8px; }
    .cd-unit{ min-width: 52px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; }
    .artist, .logo, .ep-label, .countdown, .tracklist, .cta, footer{ opacity:1 !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="artist">MUMAFI</div>
    <h1 class="logo">UNCLEARED</h1>
    <div class="ep-label">EP <span>·</span> 5 TRACKS</div>

    <div class="countdown" id="countdown">
      <div class="cd-unit"><div class="cd-num" id="days">--</div><div class="cd-label">Tage</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="hours">--</div><div class="cd-label">Std</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="mins">--</div><div class="cd-label">Min</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="secs">--</div><div class="cd-label">Sek</div></div>
    </div>

    <div class="tracklist">
      <div class="tl-title">Tracklist</div>
      <div class="track"><span class="t-num">1</span><span class="t-name">Sun</span><span class="t-dur">02:13</span></div>
      <div class="track"><span class="t-num">2</span><span class="t-name">Klarheit</span><span class="t-dur">01:29</span></div>
      <div class="track"><span class="t-num">3</span><span class="t-name">Juckt nicht!</span><span class="t-dur">02:10</span></div>
      <div class="track"><span class="t-num">4</span><span class="t-name">Real Freedom</span><span class="t-dur">02:34</span></div>
      <div class="track"><span class="t-num">5</span><span class="t-name">Niemand</span><span class="t-dur">02:37</span></div>
    </div>

    <div class="cta">
      <div class="socials">
        <a href="https://open.spotify.com/album/3zCmlFlw9Bda4tv4WcCGLc" target="_blank" rel="noopener">Spotify</a>
        <a href="https://music.apple.com/us/album/6769761319" target="_blank" rel="noopener">Apple Music</a>
        <a href="https://www.deezer.com/us/album/983546121" target="_blank" rel="noopener">Deezer</a>
        <a href="https://youtube.com/playlist?list=OLAK5uy_lvZV2HSBVsXen77WKjkBB-AbNOR2cwxag" target="_blank" rel="noopener">YouTube</a>
        <a href="https://on.soundcloud.com/nt8hNj0FdvOADE5Gt2" target="_blank" rel="noopener">SoundCloud</a>
        <a href="https://music.amazon.de/albums/B0H1X1VP88?marketplaceId=A1PA6795UKMFR9&musicTerritory=DE&ref=dm_sh_kfWtG6zoIY29N0fxjrlLFCq9Z" target="_blank" rel="noopener">Amazon Music</a>
      </div>
    </div>

    <footer>MUMAFI © 2026</footer>
  </div>

<script>
  // ---- SET YOUR RELEASE DATE HERE (local time) ----
  const RELEASE_DATE = new Date('2026-08-21T00:00:00');
  // ---------------------------------------------------

  function updateCountdown(){
    const now = new Date();
    let diff = RELEASE_DATE - now;

    if(diff <= 0){
      document.getElementById('countdown').innerHTML =
        '<div style="font-family:Oswald,sans-serif;font-size:clamp(22px,6vw,32px);color:var(--chrome1);letter-spacing:0.1em;">OUT NOW</div>';
      return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const mins = Math.floor((diff / (1000*60)) % 60);
    const secs = Math.floor((diff / 1000) % 60);

    document.getElementById('days').textContent = String(days).padStart(2,'0');
    document.getElementById('hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('mins').textContent = String(mins).padStart(2,'0');
    document.getElementById('secs').textContent = String(secs).padStart(2,'0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

</script>
</body>
</html>
